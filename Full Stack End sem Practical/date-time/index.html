<!DOCTYPE html>
<html>
<head>
    <title>Simple Date & Time</title>
</head>
<body>
    <button onclick="showDateTime()">Show Date & Time</button>
    <p id="displayArea"></p>

    <script>
        function showDateTime() {
            var now = new Date();
            document.getElementById("displayArea").innerHTML = now.toString();
        }
    </script>
</body>
</html>
